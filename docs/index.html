<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grep Updates</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f0e8;
      --panel: #fffdf8;
      --text: #1f1b16;
      --muted: #6f665b;
      --accent: #116466;
      --border: #d9d0c3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Text", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at top left, #fff8ea 0, transparent 35%),
        linear-gradient(180deg, #efe8db 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      width: min(760px, calc(100vw - 32px));
      margin: 48px auto;
      padding: 28px;
      background: color-mix(in srgb, var(--panel) 92%, white 8%);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(65, 51, 33, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 14px;
      line-height: 1.65;
    }

    .muted {
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }

    .card {
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 650;
    }

    a:hover {
      text-decoration: underline;
    }

    code {
      font-family: "SF Mono", ui-monospace, monospace;
      font-size: 0.92em;
      background: rgba(17, 100, 102, 0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main>
    <p class="muted">Private Distribution</p>
    <h1>Grep Updates</h1>
    <p>Grep.app の配布用ページです。Sparkle は <code>appcast.xml</code> を読み、更新ファイルをここから取得します。</p>
    <p class="muted">このURL自体は限定共有の前提です。</p>

    <section class="grid">
      <article class="card">
        <h2>Appcast</h2>
        <p><a href="./appcast.xml">appcast.xml</a></p>
      </article>

      <article class="card">
        <h2>Latest Release</h2>
        <p><a href="./Grep-1.0.2-3.dmg">Grep 1.0.2 (build 3)</a></p>
      </article>

      <article class="card">
        <h2>Previous Release</h2>
        <p><a href="./Grep-1.0.1-2.dmg">Grep 1.0.1 (build 2)</a></p>
      </article>
    </section>
  </main>
</body>
</html>
